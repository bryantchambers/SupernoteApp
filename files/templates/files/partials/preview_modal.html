<!-- Preview Modal Partial -->
<div id="preview-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md"
     onclick="if (event.target === this) { document.getElementById('preview-container').innerHTML = ''; }">
    
    <div class="relative bg-white/95 rounded-2xl shadow-2xl border border-slate-200/50 flex flex-col overflow-hidden animate-fade-in-up backdrop-blur-xl"
         role="dialog" aria-modal="true" aria-labelledby="preview-title"
         style="width: 90vw; max-width: 800px; height: 90vh;"
         onclick="event.stopPropagation();">
        
        <!-- Header -->
        <div class="flex items-center justify-between p-4 border-b border-slate-200 bg-white/80 backdrop-blur">
            <h3 id="preview-title" class="text-lg font-bold text-slate-800 truncate pr-4">
                {{ node.name }}
            </h3>
            <button type="button"
                    onclick="document.getElementById('preview-container').innerHTML = '';"
                    class="p-2 text-slate-400 hover:text-slate-800 rounded-full hover:bg-slate-100 transition-colors"
                    aria-label="Close preview">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Content Area -->
        <div class="flex-1 overflow-auto bg-slate-50/50 p-4 flex items-center justify-center relative">
            {% if preview_type == 'image' %}
                <img src="{% url 'files:serve_preview_media' node.pk %}" alt="{{ node.name }}" class="max-w-full max-h-full object-contain rounded shadow-lg border border-slate-200" style="height: 100%;">
            {% elif preview_type == 'iframe' %}
                <iframe src="{% url 'files:serve_preview_media' node.pk %}" class="border-0 rounded bg-white shadow-inner absolute inset-0" style="width: 100%; height: 100%;"></iframe>
            {% else %}
                <div class="text-center text-slate-500">
                    <svg class="mx-auto h-12 w-12 text-slate-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <p class="text-lg font-bold text-slate-700">Preview Unsupported</p>
                    <p class="text-sm mt-2 text-slate-500">Cannot generate a preview for this file type.</p>
                </div>
            {% endif %}
        </div>
        
    </div>
</div>

<style>
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}
.animate-fade-in-up {
    animation: fadeInUp 0.2s ease-out forwards;
}
</style>
